<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(120,140,200,0.10)" stroke-width="1"/>
    </pattern>
    <radialGradient id="blackhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="40%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <!-- title block -->
  <text x="540" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="120" fill="url(#title)" letter-spacing="6">ORBITAL</text>
  <text x="540" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="26" fill="#E6E9F5" opacity="0.9" letter-spacing="3">FREE MULTIPLAYER TANK ARENA</text>

  <!-- main scene -->
  <g transform="translate(540 580)">
    <!-- black hole bottom-left -->
    <g transform="translate(-260 130)">
      <circle r="180" fill="url(#blackhole)"/>
      <circle r="40" fill="#0a0014" stroke="#A78BFA" stroke-width="4"/>
      <path d="M-78 0 A78 78 0 0 1 78 0" stroke="rgba(167,139,250,0.85)" stroke-width="4" fill="none"/>
    </g>
    <!-- tank centered -->
    <g>
      <circle r="92" fill="rgba(239,68,68,0.2)"/>
      <g transform="rotate(-20)">
        <rect x="0" y="-22" width="140" height="44" fill="#888EA0" stroke="#333A4E" stroke-width="4"/>
      </g>
      <circle r="70" fill="#5B8CFF" stroke="#1F3A8A" stroke-width="6"/>
      <g transform="translate(0 -108)">
        <path d="M-30 18 L-30 0 L-15 9 L0 -6 L15 9 L30 0 L30 18 Z" fill="#FBBF24" stroke="#92400E" stroke-width="2"/>
      </g>
    </g>
    <!-- bullets -->
    <g fill="#FED7AA" stroke="#9A3412" stroke-width="2">
      <circle cx="165" cy="-50" r="13"/>
      <circle cx="240" cy="-75" r="13"/>
      <circle cx="305" cy="-100" r="13"/>
    </g>
    <!-- shapes -->
    <rect x="-380" y="-280" width="44" height="44" fill="#FACC15" stroke="#A16207" stroke-width="3" transform="rotate(18 -358 -258)"/>
    <rect x="310" y="-260" width="44" height="44" fill="#FACC15" stroke="#A16207" stroke-width="3" transform="rotate(-25 332 -238)"/>
    <polygon points="-340,80 -310,140 -370,140" fill="#F87171" stroke="#991B1B" stroke-width="3"/>
    <polygon points="340,80 376,98 364,134 326,134 314,98" fill="#60A5FA" stroke="#1E3A8A" stroke-width="3"/>
  </g>

  <!-- feature bullets -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="540" y="900" text-anchor="middle" font-weight="700" font-size="32" fill="#22d3ee">Aim. Fire. Level Up. Dominate.</text>
    <text x="540" y="950" text-anchor="middle" font-weight="500" font-size="22" fill="#E6E9F5" opacity="0.85">Black Hole · Orbital Strike · Phase Shift · Hyperfire</text>
  </g>

  <!-- URL -->
  <rect x="220" y="990" width="640" height="62" rx="8" fill="rgba(124,92,255,0.18)" stroke="#7c5cff" stroke-width="2"/>
  <text x="540" y="1031" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#fff">playorbital.up.railway.app</text>
</svg>
