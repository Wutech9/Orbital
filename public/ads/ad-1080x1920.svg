<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="60%" stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(120,140,200,0.08)" stroke-width="1"/>
    </pattern>
    <radialGradient id="bh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="40%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#grid)"/>

  <text x="540" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="160" fill="url(#title)" letter-spacing="8">ORBITAL</text>
  <text x="540" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="32" fill="#E6E9F5" opacity="0.9" letter-spacing="4">FREE MULTIPLAYER TANK ARENA</text>

  <!-- big black hole top center -->
  <g transform="translate(540 700)">
    <circle r="270" fill="url(#bh)"/>
    <circle r="60" fill="#0a0014" stroke="#A78BFA" stroke-width="5"/>
    <path d="M-110 0 A110 110 0 0 1 110 0" stroke="rgba(167,139,250,0.85)" stroke-width="5" fill="none"/>
    <path d="M-135 -40 A135 135 0 0 1 135 -40" stroke="rgba(167,139,250,0.4)" stroke-width="4" fill="none"/>
  </g>

  <!-- tank below -->
  <g transform="translate(540 1180)">
    <circle r="120" fill="rgba(239,68,68,0.2)"/>
    <g transform="rotate(-15)">
      <rect x="0" y="-30" width="180" height="60" fill="#888EA0" stroke="#333A4E" stroke-width="5"/>
    </g>
    <circle r="92" fill="#5B8CFF" stroke="#1F3A8A" stroke-width="7"/>
    <g transform="translate(0 -140)">
      <path d="M-40 24 L-40 0 L-20 12 L0 -8 L20 12 L40 0 L40 24 Z" fill="#FBBF24" stroke="#92400E" stroke-width="2"/>
    </g>
  </g>

  <!-- features list -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="34" fill="#22d3ee">
    <text x="540" y="1480" text-anchor="middle">★ 4 classes · pick at Level 15</text>
    <text x="540" y="1530" text-anchor="middle">★ Black Hole · Orbital Strike</text>
    <text x="540" y="1580" text-anchor="middle">★ Phase Shift · Hyperfire · EMP</text>
    <text x="540" y="1630" text-anchor="middle">★ No download · no signup</text>
  </g>

  <!-- URL -->
  <rect x="120" y="1720" width="840" height="100" rx="14" fill="rgba(124,92,255,0.18)" stroke="#7c5cff" stroke-width="3"/>
  <text x="540" y="1786" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="44" fill="#fff">playorbital.up.railway.app</text>
</svg>
