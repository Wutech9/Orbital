<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" width="728" height="90">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="728" height="90" fill="url(#bg)"/>
  <!-- tank on left -->
  <g transform="translate(50 45)">
    <g transform="rotate(0)">
      <rect x="0" y="-12" width="42" height="24" fill="#888EA0" stroke="#333A4E" stroke-width="2"/>
    </g>
    <circle r="22" fill="#5B8CFF" stroke="#1F3A8A" stroke-width="3"/>
  </g>
  <!-- shapes -->
  <rect x="118" y="22" width="20" height="20" fill="#FACC15" stroke="#A16207" stroke-width="2" transform="rotate(18 128 32)"/>
  <polygon points="138,72 150,52 126,52" fill="#F87171" stroke="#991B1B" stroke-width="2"/>

  <!-- title -->
  <text x="195" y="42" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="32" fill="url(#title)" letter-spacing="2">ORBITAL</text>
  <text x="195" y="64" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#E6E9F5" opacity="0.85">Free multiplayer tank arena · WASD + mouse</text>
  <text x="195" y="82" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" fill="#22d3ee">playorbital.up.railway.app</text>

  <!-- play button -->
  <rect x="600" y="22" width="105" height="46" rx="6" fill="#7c5cff"/>
  <text x="652" y="51" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="16" fill="#fff">▶ PLAY FREE</text>
</svg>
